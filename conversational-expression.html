<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Declarative Sentence</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="header"></header>
    <main id="list">
        <div id="radio">
            <input type="radio" name="category" id="返答" value="返答" checked>
            <label for="返答">返答</label>
            <input type="radio" name="category" id="発信" value="発信">
            <label for="発信">発信</label>
            <input type="radio" name="category" id="電話" value="電話">
            <label for="電話">電話</label>
            <input type="radio" name="category" id="その他" value="その他">
            <label for="その他">その他</label>
        </div>
        <ul id="phrase-list"></ul>
        <div id="popup">
            <div id="popup-content">
                <p id="popup-en"></p>
                <p id="popup-ja"></p>
                <button id="close">close</button>
            </div>
        </div>
    </main>
    <footer id="footer"></footer>
    <script src="js/header.js"></script>
    <script src="js/footer.js"></script>
    <script src="js/script.js"></script>
    <script src="js/list.js"></script>
</body>
</html>
