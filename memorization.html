<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Memorization</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="header"></header>
    <main id="home">
        <h1>暗記カード</h1>
        <section>
            <h2>Words</h2>
            <ul id="list">
                <li id="noun_business">名詞：ビジネス</li>
                <li id="verb_usage_infinitives">動詞の語法：不定詞</li>
                <li id="adverbial_expressions">副詞表現</li>
                <li id="adjective">Adjectives</li>
                <li id="adjective-phrase">Adjective Phrases</li>
            </ul>
        </section>
    </main>
    <footer id="footer"></footer>
    <script src="js/header.js"></script>
    <script src="js/footer.js"></script>
    <script src="js/script.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const List = document.getElementById("list");
            List.addEventListener("click", (e) => {
                // li がクリックされたときだけ処理
                if (e.target.tagName === "LI") {
                    const Id = e.target.id;
                    localStorage.setItem("selectedId_memorization", Id);  // ローカルストレージに保存
                    window.location.href = "memorization/display.html";  // ページ遷移
                }
            });
        });
    </script>
</body>
</html>
