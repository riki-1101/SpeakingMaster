<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Memorization</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="header"></header>
    <main id="home">
        <h1>暗記カード</h1>
        <section>
            <h2>名詞</h2>
            <ul class="list">
                <li id="noun_business">ビジネスで用いられる語</li>
                <li id="noun_business_person">ビジネスでの人に関する語</li>
                <li id="noun_occupation">職業</li>
                <li id="noun_industry">業種</li>
            </ul>
        </section>
        <section>
            <h2>その他</h2>
            <ul class="list">
                <li id="verb_usage_infinitives">動詞の語法：不定詞</li>
                <li id="adverbial_expressions">副詞表現</li>
                <li id="adjective">Adjectives</li>
                <li id="adjective-phrase">Adjective Phrases</li>
            </ul>
        </section>
    </main>
    <footer id="footer"></footer>
    <script src="js/header.js"></script>
    <script src="js/footer.js"></script>
    <script src="js/script.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const lists = document.querySelectorAll(".list");
            lists.forEach(list => {
                list.addEventListener("click", (e) => {
                    if (e.target.tagName === "LI") {
                        const id = e.target.id;
                        localStorage.setItem("selectedId_memorization", id);
                        window.location.href = "memorization/display.html";
                    }
                });
            });
        });
    </script>
</body>
</html>
